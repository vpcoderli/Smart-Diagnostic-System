<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>诊断浏览器 v10</title>
<style>
  html, body {
    background: #11131f; color: #e6e8ef; margin: 0; height: 100%;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
  }
  .wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 22px; padding: 24px; box-sizing: border-box;
  }
  .ver {
    position: fixed; top: 10px; left: 14px;
    font-size: 13px; color: #6cf; letter-spacing: 1px; font-weight: bold;
  }
  .title { font-size: 20px; font-weight: 600; }
  .gobtn {
    display: inline-block; background: #4a7cff; color: #fff !important;
    text-decoration: none; padding: 18px 44px; border-radius: 10px;
    font-size: 19px; font-weight: 700; cursor: pointer; border: none;
    box-shadow: 0 4px 14px rgba(74,124,255,.4);
  }
  .gobtn:hover { background: #3a6cef; }
  .url {
    color: #8ab4ff; font-size: 13px; word-break: break-all;
    max-width: 80%; text-align: center; line-height: 1.5;
  }
  .hint { color: #8890a6; font-size: 13px; text-align: center; }
  #status { color: #c0c6d8; font-size: 15px; }
</style>
</head>
<body>
  <div class="ver">DIAG v10</div>
  <div class="wrap">
    <div class="title">诊断浏览器</div>
    <div id="status">正在读取诊断页面地址...</div>
    <a id="gobtn" class="gobtn" href="#" rel="noopener" style="display:none">点击进入诊断页面</a>
    <div class="url" id="urlText"></div>
    <div class="hint">若页面未自动跳转，请点击上方按钮进入</div>
  </div>
<script>
(function () {
  'use strict';
  var attempts = 0;
  var target = '';

  function setStatus(text) {
    var s = document.getElementById('status');
    if (s) s.textContent = text;
  }

  function isHttpUrl(value) {
    return /^https?:\/\//i.test(value || '');
  }

  function stillOnBridge() {
    try {
      return location.hostname === 'tauri.localhost' || location.protocol === 'tauri:' || location.protocol === 'file:';
    } catch (e) {
      return true;
    }
  }

  function showReady() {
    var btn = document.getElementById('gobtn');
    var urlText = document.getElementById('urlText');
    if (btn) {
      btn.href = target;
      btn.style.display = 'inline-block';
      if (btn.dataset.bound !== '1') {
        btn.dataset.bound = '1';
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          navigate();
        });
      }
    }
    if (urlText) urlText.textContent = target;
  }

  function navigate() {
    if (!isHttpUrl(target)) {
      setStatus('目标地址无效，请回主窗口重新打开诊断浏览器');
      return;
    }
    try {
      window.location.replace(target);
    } catch (e) {
      try { window.location.href = target; } catch (e2) {}
    }
  }

  function onTargetLoaded(value) {
    target = (value || '').trim();
    if (!isHttpUrl(target)) {
      setStatus('未获取到目标地址，请回主窗口重新打开诊断浏览器');
      return;
    }
    showReady();
    setStatus('正在自动打开诊断页面...');
    navigate();
    setTimeout(function () {
      if (stillOnBridge()) {
        setStatus('自动跳转被拦截 - 请点击下方按钮进入');
        try { window.location.href = target; } catch (e) {}
      }
    }, 300);
  }

  function parseTargetResponse(text) {
    try {
      var payload = JSON.parse(text || '{}');
      return payload.target || '';
    } catch (e) {
      return '';
    }
  }

  function loadTargetWithXhr() {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'diag://redirect-target', true);
      xhr.onload = function () { onTargetLoaded(parseTargetResponse(xhr.responseText)); };
      xhr.onerror = retryLoadTarget;
      xhr.send();
    } catch (e) {
      retryLoadTarget();
    }
  }

  function retryLoadTarget() {
    attempts += 1;
    if (attempts > 80) {
      setStatus('读取目标地址失败，请回主窗口重新打开诊断浏览器');
      return;
    }
    setTimeout(loadTarget, 50);
  }

  function loadTarget() {
    try {
      fetch('diag://redirect-target')
        .then(function (resp) { return resp.text(); })
        .then(function (text) { onTargetLoaded(parseTargetResponse(text)); })
        .catch(loadTargetWithXhr);
    } catch (e) {
      loadTargetWithXhr();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadTarget);
  } else {
    loadTarget();
  }
})();
</script>
</body>
</html>
