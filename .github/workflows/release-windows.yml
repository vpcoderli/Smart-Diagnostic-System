name: Release — Build Windows EXE

# 触发条件：推送 v* 格式的 tag（如 v0.1.0）或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      app:
        description: '要打包的应用'
        required: true
        default: 'collector'
        type: choice
        options:
          - collector
          - analyzer
          - both

# 缓存 Rust 编译产物，避免每次重新下载所有依赖（约节省 5~8 分钟）
env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # 收集端 Windows 打包
  # ──────────────────────────────────────────────
  build-collector-windows:
    name: Collector — Windows x64
    runs-on: windows-latest
    # 仅在以下条件时运行：
    # 1. 推送 tag（始终构建）
    # 2. 手动触发且选择了 collector 或 both
    if: |
      github.event_name == 'push' ||
      github.event.inputs.app == 'collector' ||
      github.event.inputs.app == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 缓存 Cargo registry 和编译产物
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            collector/src-tauri/target/
          key: ${{ runner.os }}-cargo-collector-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-collector-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Collector (Windows)
        working-directory: collector
        run: cargo tauri build --target x86_64-pc-windows-msvc

      # 上传 MSI 安装包
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: collector-windows-msi
          path: collector/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      # 上传 NSIS EXE 安装包
      - name: Upload NSIS EXE
        uses: actions/upload-artifact@v4
        with:
          name: collector-windows-nsis
          path: collector/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────
  # 分析端 Windows 打包
  # ──────────────────────────────────────────────
  build-analyzer-windows:
    name: Analyzer — Windows x64
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.app == 'analyzer' ||
      github.event.inputs.app == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            analyzer/src-tauri/target/
          key: ${{ runner.os }}-cargo-analyzer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-analyzer-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Analyzer (Windows)
        working-directory: analyzer
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-windows-msi
          path: analyzer/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS EXE
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-windows-nsis
          path: analyzer/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────
  # 发布到 GitHub Releases（仅 tag 触发时）
  # ──────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-collector-windows, build-analyzer-windows]
    # 只有推送 tag 时才创建 Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write   # 需要写权限才能创建 Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 下载所有构建产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      # 列出产物（方便调试）
      - name: List assets
        run: find release-assets/ -type f

      # 创建 GitHub Release 并上传安装包
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Smart Diagnostic System ${{ github.ref_name }}"
          body: |
            ## Smart Diagnostic System ${{ github.ref_name }}

            ### 下载说明

            | 应用 | 格式 | 说明 |
            |---|---|---|
            | 收集端 | `.msi` | 推荐，Windows 标准安装包 |
            | 收集端 | `-setup.exe` | NSIS 安装包（无需管理员权限） |
            | 分析端 | `.msi` | 推荐，Windows 标准安装包 |
            | 分析端 | `-setup.exe` | NSIS 安装包 |

            ### 使用说明
            - **收集端** 安装在医院内网 Windows 跳板机
            - **分析端** 安装在开发人员电脑
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.msi
            release-assets/**/*.exe
