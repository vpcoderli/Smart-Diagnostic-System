name: Release — Build Windows EXE

# 触发条件：推送 v* 格式的 tag（如 v0.1.0）或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      app:
        description: '要打包的应用'
        required: true
        default: 'collector'
        type: choice
        options:
          - collector
          - analyzer
          - both

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # 收集端 Windows 打包
  # ──────────────────────────────────────────────
  build-collector-windows:
    name: Collector — Windows x64
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.app == 'collector' ||
      github.event.inputs.app == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # Node 20 已弃用，使用 22 LTS

      # 缓存 Cargo registry（workspace target 在仓库根目录）
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-collector-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-collector-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # 只打 NSIS（Windows 默认格式，GitHub Runner 已内置所需工具）
      # --bundles nsis 显式指定，避免尝试 msi 时因 WiX 缺失报错
      # 打包时 Tauri 会下载 ~150MB 的 WebView2 离线运行时(offlineInstaller 模式),
      # 从微软 fwlink 拉大文件偶发 `Peer disconnected`,故加重试(编译已缓存,重试很快)。
      - name: Build Collector (Windows NSIS)
        working-directory: collector
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "=== 打包尝试 $i/$max ==="
            cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "打包失败 (exit $LASTEXITCODE),15s 后重试..."
            Start-Sleep -Seconds 15
          }
          Write-Host "连续 $max 次打包均失败"
          exit 1

      # 列出实际产物路径（方便排查）
      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== bundle directory ==="
          Get-ChildItem -Recurse target\x86_64-pc-windows-msvc\release\bundle -ErrorAction SilentlyContinue | Select-Object FullName

      # 产物在 workspace 根目录的 target/，不在 collector/src-tauri/target/
      - name: Upload NSIS EXE
        uses: actions/upload-artifact@v4
        with:
          name: collector-windows-setup
          path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────
  # 分析端 Windows 打包
  # ──────────────────────────────────────────────
  build-analyzer-windows:
    name: Analyzer — Windows x64
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.app == 'analyzer' ||
      github.event.inputs.app == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-analyzer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-analyzer-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Analyzer (Windows NSIS)
        working-directory: analyzer
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "=== 打包尝试 $i/$max ==="
            cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "打包失败 (exit $LASTEXITCODE),15s 后重试..."
            Start-Sleep -Seconds 15
          }
          Write-Host "连续 $max 次打包均失败"
          exit 1

      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== bundle directory ==="
          Get-ChildItem -Recurse target\x86_64-pc-windows-msvc\release\bundle -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Upload NSIS EXE
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-windows-setup
          path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────────────────────────
  # 发布到 GitHub Releases（仅 tag 触发时）
  # ──────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-collector-windows, build-analyzer-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: List assets
        run: find release-assets/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Smart Diagnostic System ${{ github.ref_name }}"
          body: |
            ## Smart Diagnostic System ${{ github.ref_name }}

            ### 下载

            | 应用 | 文件 | 说明 |
            |---|---|---|
            | 收集端 | `*-setup.exe` | 安装在医院内网 Windows 跳板机 |
            | 分析端 | `*-setup.exe` | 安装在开发人员电脑 |
          draft: false
          prerelease: false
          files: release-assets/**/*.exe
